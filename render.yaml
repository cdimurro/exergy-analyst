services:
  - type: web
    name: exergy-lab
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_PRE_LAUNCH
        value: "false"
      - key: NEXTAUTH_URL
        value: https://exergylab.com
      - key: AUTH_URL
        value: https://exergylab.com
      - key: AUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        value: support@exergylab.com
      - key: NEXT_PUBLIC_NATURE_ENGINE_EXPLORE_URL
        value: /nature/explorer
      - key: EXERGY_AGENT_SANDBOX_MODE
        value: local
      - key: EXERGY_AGENT_ALLOW_DEPENDENCY_INSTALL
        value: "true"
      - key: EXERGY_AGENT_ALLOW_NETWORK
        value: "false"
